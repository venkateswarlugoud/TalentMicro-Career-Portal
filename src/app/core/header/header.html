<header class="app-header">
  <nav class="navbar navbar-expand-lg app-navbar border-bottom">
    <div class="container">
      <a
        class="navbar-brand d-flex align-items-center gap-2"
        routerLink="/"
        (click)="closeNav()"
      >
        <img
          class="brand-logo"
          src="assets/logo.svg"
          width="36"
          height="36"
          alt=""
          aria-hidden="true"
        />
        <span class="brand-text">Career Portal</span>
      </a>

      <div class="navbar-actions d-flex align-items-center gap-1 order-lg-2">
        <button
          mat-icon-button
          type="button"
          class="theme-toggle-btn"
          (click)="toggleTheme()"
          [attr.aria-label]="isDarkTheme() ? 'Switch to light mode' : 'Switch to dark mode'"
        >
          <mat-icon>{{ isDarkTheme() ? 'light_mode' : 'dark_mode' }}</mat-icon>
        </button>

        <button
          class="navbar-toggler border-0 shadow-none"
          type="button"
          aria-controls="mainNavbar"
          [attr.aria-expanded]="!isNavCollapsed()"
          aria-label="Toggle navigation"
          (click)="toggleNav()"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>

      <div
        class="collapse navbar-collapse order-lg-1"
        id="mainNavbar"
        [class.show]="!isNavCollapsed()"
      >
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1">
          <li class="nav-item">
            <a
              class="nav-link px-3"
              routerLink="/"
              routerLinkActive="active"
              [routerLinkActiveOptions]="{ exact: true }"
              (click)="closeNav()"
            >
              Home
            </a>
          </li>
          <li class="nav-item">
            <a
              class="nav-link px-3"
              routerLink="/jobs"
              routerLinkActive="active"
              (click)="closeNav()"
            >
              Jobs
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</header>
